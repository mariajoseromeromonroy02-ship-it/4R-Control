<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso - 4R Control</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background:#111;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .login-box{
        background:white;
        padding:40px;
        border-radius:20px;
        width:400px;
        box-shadow:0 0 20px rgba(0,0,0,.2);
    }

    h2{
        text-align:center;
        color:#d4af37;
        margin-bottom:20px;
    }

    .btn-login{
        background:#cc0000;
        color:white;
        width:100%;
        border:none;
        padding:10px;
        border-radius:10px;
    }
</style>
```

</head>
<body>

<div class="login-box">

```
<h2>4R CONTROL</h2>

<form method="post">

    {% csrf_token %}

    <div class="mb-3">
        <label>Usuario</label>
        <input type="text" name="username" class="form-control">
    </div>

    <div class="mb-3">
        <label>Contraseña</label>
        <input type="password" name="password" class="form-control">
    </div>

    <button type="submit" class="btn-login">
        Ingresar
    </button>

</form>
```

</div>

</body>
</html>
